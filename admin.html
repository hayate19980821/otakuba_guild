<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050505">
<title>おたく場ギルド 管理</title>
<style>
:root{
  --gold:#f6c84f;--white:#fff6df;--green:#73ff5f;--red:#ff6767;--blue:#8bd3ff;
  --panel:rgba(3,7,13,.78);--line:rgba(246,200,79,.62);
  --shadow:0 0 0 2px #1b1203,0 0 0 4px rgba(246,200,79,.68),0 10px 30px rgba(0,0,0,.62);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;background:#000;color:var(--white);font-family:"Hiragino Sans","Yu Gothic",Meiryo,monospace;overflow:hidden}
button,input,textarea,select{font:inherit}button{border:0;background:none;color:inherit}input,textarea,select{width:100%;padding:10px;border:2px solid var(--line);border-radius:9px;background:rgba(0,0,0,.64);color:var(--white);outline:none}
textarea{min-height:74px;resize:vertical}
.app{position:relative;width:100vw;max-width:480px;height:100dvh;margin:0 auto;background:#000;overflow:hidden}
.bg{position:absolute;inset:0;z-index:-2;background:linear-gradient(to bottom,rgba(0,0,0,.12),rgba(0,0,0,.62)),url("background.jpg") center/cover no-repeat}
.bg:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 18%,rgba(255,226,130,.12),transparent 34%),linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.70))}
.header{position:sticky;top:0;z-index:10;padding:calc(10px + env(safe-area-inset-top)) 12px 8px;background:linear-gradient(to bottom,rgba(0,0,0,.84),rgba(0,0,0,.38));backdrop-filter:blur(3px)}
.title{display:flex;align-items:center;justify-content:space-between;gap:10px}.title h1{margin:0;color:var(--gold);font-size:20px;text-shadow:2px 2px 0 #000}
.link-btn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;padding:9px 12px;border:2px solid var(--white);border-radius:9px;background:rgba(0,0,0,.72);text-decoration:none;color:var(--white);box-shadow:0 4px 12px rgba(0,0,0,.34);font-weight:700}
.btn.gold{background:linear-gradient(#ffe58a,#c89225);color:#1b1200;text-shadow:none;border-color:#fff6c8}.btn.green{background:linear-gradient(#9cff8b,#37b72a);color:#051b00;text-shadow:none;border-color:#d9ffd4}.btn.red{background:#5b1111;color:#ffd6d6;border-color:#ffaaaa}.btn.small{min-height:30px;padding:5px 8px;font-size:12px;border-width:2px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:9px}
.tab{min-height:39px;padding:6px 3px;border:2px solid rgba(255,255,255,.84);border-radius:8px;background:rgba(0,0,0,.62);font-size:11px;font-weight:800;text-shadow:1px 1px 0 #000}
.tab.active{background:linear-gradient(#ffe58a,#c89225);color:#1b1200;text-shadow:none;border-color:#fff6c8}
.main{height:calc(100dvh - 124px);overflow:auto;padding:10px 12px calc(18px + env(safe-area-inset-bottom));scrollbar-width:none}.main::-webkit-scrollbar{display:none}
.panel{background:linear-gradient(180deg,rgba(7,12,20,.68),rgba(0,3,8,.78));border:3px solid rgba(255,246,223,.88);border-radius:13px;box-shadow:var(--shadow);padding:12px;margin-bottom:10px;backdrop-filter:blur(2.5px)}
.section-title{color:var(--gold);font-weight:900;margin:2px 0 8px;text-shadow:2px 2px 0 #000}.help{font-size:12px;opacity:.82;line-height:1.55}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.field{margin:8px 0}.field label{display:block;font-size:12px;color:var(--gold);margin-bottom:3px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{background:rgba(0,0,0,.42);border:1px solid rgba(246,200,79,.42);border-radius:10px;padding:10px}.metric-label{font-size:11px;opacity:.75}.metric-value{color:var(--gold);font-size:20px;font-weight:900;margin-top:3px}
.genre-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:8px 0}.genre-tab{border:1px solid rgba(255,255,255,.62);border-radius:8px;background:rgba(0,0,0,.44);min-height:34px;font-size:12px}.genre-tab.active{background:rgba(246,200,79,.88);color:#1b1200;font-weight:900}
.item{border:1px solid rgba(255,255,255,.26);border-radius:11px;padding:9px;margin-bottom:8px;background:rgba(0,0,0,.38)}
.item-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.item-name{color:var(--gold);font-weight:900}.item-sub{font-size:12px;opacity:.82;line-height:1.4}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.actions .btn{flex:1;min-width:82px}
.badge{display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(246,200,79,.5);border-radius:999px;padding:3px 7px;font-size:11px;background:rgba(0,0,0,.4);color:var(--gold)}
.hidden{display:none!important}.toast{position:fixed;left:16px;right:16px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:30;display:none}.toast.show{display:block;animation:pop .2s ease both}.toast .panel{margin:0;text-align:center}
.modal{position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.75);display:none;padding:14px;overflow:auto}.modal.on{display:block}.modal-box{max-width:480px;margin:0 auto}
.sales-line{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px 0;border-bottom:1px dashed rgba(255,255,255,.25);font-size:12px}.danger{color:#ffd6d6}.ok{color:var(--green)}
.preview-img{width:52px;height:52px;object-fit:contain;border:1px solid rgba(246,200,79,.5);border-radius:8px;background:rgba(0,0,0,.45)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media (max-height:740px){.tabs{grid-template-columns:repeat(4,1fr)}.tab{font-size:10.5px;min-height:35px}.main{height:calc(100dvh - 116px)}}
</style>
</head>
<body>
<div class="app">
  <div class="bg"></div>
  <div class="header">
    <div class="title">
      <h1>⚙ おたく場ギルド管理</h1>
      <a class="link-btn btn small" href="index.html">一般へ</a>
    </div>
    <div class="tabs" id="topTabs">
      <button class="tab active" data-tab="dashboard">概要</button>
      <button class="tab" data-tab="menu">メニュー</button>
      <button class="tab" data-tab="sales">売上</button>
      <button class="tab" data-tab="customers">顧客</button>
      <button class="tab" data-tab="battle">討伐</button>
      <button class="tab" data-tab="notice">本日</button>
      <button class="tab" data-tab="notify">通知</button>
      <button class="tab" data-tab="design">デザイン</button>
      <button class="tab" data-tab="data">データ</button>
    </div>
  </div>
  <main class="main" id="main"></main>
</div>

<div class="modal" id="editModal"><div class="modal-box panel" id="editBox"></div></div>
<div class="toast" id="toast"><div class="panel" id="toastText"></div></div>

<script>
(function(){
'use strict';

const APP_KEY='otakubaGuildApp.v2.masterMenu';
const OLD_KEY='otakubaGuildApp.v1';
const BATTLE_KEY='otakubaGuildBattle.v3';
const BATTLE_STATE_KEY='otakubaGuildBattleState.v3';
const BATTLE_APPLIED_KEY='otakubaGuildBattleAppliedTotal.v3';
const GAS_URL='https://script.google.com/macros/s/AKfycbyC_LpdnP5ernEo2g99qqo-mBFl87JLj47jMjIUTdyNdLeXcJX0L77ZKMZE8K9rYc3n6A/exec';

const CATS=[
  ['drink','ドリンク'],
  ['food','フード'],
  ['alcohol','アルコール'],
  ['dessert','デザート'],
  ['event','限定'],
  ['hidden','非表示']
];
const CAT_MAP=Object.fromEntries(CATS);

const DEFAULT_PRODUCTS=[
  {id:uid(),cat:'drink',name:'コーラ',price:400,emoji:'🥤',desc:'ソフトドリンク。',image:''},
  {id:uid(),cat:'drink',name:'烏龍茶',price:400,emoji:'🍵',desc:'回復用。',image:''},
  {id:uid(),cat:'alcohol',name:'ビール',price:700,emoji:'🍺',desc:'酒場の定番。',image:''},
  {id:uid(),cat:'alcohol',name:'ハイボール',price:650,emoji:'🥃',desc:'爽快な一杯。',image:''},
  {id:uid(),cat:'food',name:'唐揚げ',price:650,emoji:'🍗',desc:'冒険者の基本装備。',image:''},
  {id:uid(),cat:'food',name:'ポテト',price:550,emoji:'🍟',desc:'つまめる定番。',image:''},
  {id:uid(),cat:'dessert',name:'本日の甘味',price:500,emoji:'🍰',desc:'気まぐれ報酬。',image:''},
  {id:uid(),cat:'event',name:'限定クエスト飯',price:900,emoji:'🍛',desc:'期間限定。',image:''}
];

const DEFAULT_BATTLE={
  enabled:true,mode:'continue',speed:'normal',defaultBackground:'grass.png',
  backgrounds:['grass.png','forest.png','cave.png','ruins.png','mountain.png','volcano.png','castle.png','background.jpg'],
  monsterImages:['slime.png','goblin.png','orc.png','skeleton.png','mimic.png','gargoyle.png','dark_wizard.png','minotaur.png','dragon.png','maou.png'],
  monsters:[
    {id:'m01',name:'スライム',hp:500,image:'slime.png',background:'grass.png',stage:'草原',emoji:'🟢'},
    {id:'m02',name:'ゴブリン 1/3',hp:500,image:'goblin.png',background:'forest.png',stage:'森',emoji:'👹'},
    {id:'m03',name:'ゴブリン 2/3',hp:500,image:'goblin.png',background:'forest.png',stage:'森',emoji:'👹'},
    {id:'m04',name:'ゴブリン 3/3',hp:500,image:'goblin.png',background:'forest.png',stage:'森',emoji:'👹'},
    {id:'m05',name:'オーク 1/2',hp:2500,image:'orc.png',background:'mountain.png',stage:'山',emoji:'🪓'},
    {id:'m06',name:'オーク 2/2',hp:2500,image:'orc.png',background:'mountain.png',stage:'山',emoji:'🪓'},
    {id:'m07',name:'スケルトン 1/2',hp:1000,image:'skeleton.png',background:'cave.png',stage:'洞窟',emoji:'💀'},
    {id:'m08',name:'スケルトン 2/2',hp:1000,image:'skeleton.png',background:'cave.png',stage:'洞窟',emoji:'💀'},
    {id:'m09',name:'ミミック 1/2',hp:2500,image:'mimic.png',background:'cave.png',stage:'洞窟',emoji:'📦'},
    {id:'m10',name:'ミミック 2/2',hp:2500,image:'mimic.png',background:'cave.png',stage:'洞窟',emoji:'📦'},
    {id:'m11',name:'ガーゴイル',hp:5000,image:'gargoyle.png',background:'ruins.png',stage:'遺跡',emoji:'🗿'},
    {id:'m12',name:'ダークウィザード',hp:10000,image:'dark_wizard.png',background:'ruins.png',stage:'遺跡',emoji:'🧙'},
    {id:'m13',name:'ミノタウロス',hp:10000,image:'minotaur.png',background:'volcano.png',stage:'火山',emoji:'🐂'},
    {id:'m14',name:'ドラゴン',hp:15000,image:'dragon.png',background:'castle.png',stage:'王城前',emoji:'🐉'},
    {id:'m15',name:'魔王',hp:20000,image:'maou.png',background:'castle.png',stage:'魔王城',emoji:'👑'}
  ]
};

let state=loadApp();
let battle=loadBattle();
let active='dashboard';
let activeGenre='drink';

const $=id=>document.getElementById(id);
function uid(){return 'p'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function clone(v){return JSON.parse(JSON.stringify(v))}
function yen(n){return Number(n||0).toLocaleString('ja-JP')+'G'}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(msg){$('toastText').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}

function loadApp(){
  try{
    const now=JSON.parse(localStorage.getItem(APP_KEY));
    if(now&&Array.isArray(now.products))return normalizeApp(now);
    const old=JSON.parse(localStorage.getItem(OLD_KEY));
    if(old&&Array.isArray(old.products))return normalizeApp(old);
  }catch(e){}
  return normalizeApp({name:'',orders:[],products:DEFAULT_PRODUCTS,customers:[],sales:[],settings:{currentCat:'drink',sound:true,partyCount:1,confirmedItems:{},customBg:'',customTitleBg:'',customBgm:''}});
}
function normalizeApp(s){
  s.name=s.name||'';
  s.orders=Array.isArray(s.orders)?s.orders:[];
  s.products=Array.isArray(s.products)?s.products:DEFAULT_PRODUCTS;
  s.customers=Array.isArray(s.customers)?s.customers:[];
  s.sales=Array.isArray(s.sales)?s.sales:[];
  s.settings=s.settings||{};
  return s;
}
function saveApp(){localStorage.setItem(APP_KEY,JSON.stringify(state))}
function loadBattle(){
  try{
    const b=JSON.parse(localStorage.getItem(BATTLE_KEY));
    if(b&&Array.isArray(b.monsters))return normalizeBattle(b);
  }catch(e){}
  return clone(DEFAULT_BATTLE);
}
function normalizeBattle(b){
  b.enabled=b.enabled!==false;
  b.mode=b.mode||'continue';
  b.speed=b.speed||'normal';
  b.defaultBackground=b.defaultBackground||'grass.png';
  b.backgrounds=Array.isArray(b.backgrounds)&&b.backgrounds.length?b.backgrounds:clone(DEFAULT_BATTLE.backgrounds);
  b.monsterImages=Array.isArray(b.monsterImages)&&b.monsterImages.length?b.monsterImages:clone(DEFAULT_BATTLE.monsterImages);
  b.monsters=Array.isArray(b.monsters)?b.monsters:clone(DEFAULT_BATTLE.monsters);
  b.monsters=b.monsters.map((m,i)=>({
    id:m.id||('m'+String(i+1).padStart(2,'0')),
    name:m.name||('敵 #'+(i+1)),
    stage:m.stage||'STAGE',
    hp:Number(m.hp)||500,
    image:m.image||'slime.png',
    background:m.background||b.defaultBackground,
    emoji:m.emoji||'👾'
  }));
  return b;
}
function saveBattle(){localStorage.setItem(BATTLE_KEY,JSON.stringify(normalizeBattle(battle)))}
function loadBattleState(){
  let s;try{s=JSON.parse(localStorage.getItem(BATTLE_STATE_KEY)||'null')}catch(e){}
  if(!s||!Number.isFinite(s.index)||!Number.isFinite(s.hp))s={index:0,hp:battle.monsters[0]?.hp||500,totalDamage:0};
  if(s.index>=battle.monsters.length)s={index:0,hp:battle.monsters[0]?.hp||500,totalDamage:Number(s.totalDamage||0)};
  return s;
}
function saveBattleState(s){localStorage.setItem(BATTLE_STATE_KEY,JSON.stringify(s))}

function saleTotal(rec){
  if(Number.isFinite(Number(rec.total)))return Number(rec.total);
  if(Array.isArray(rec.items))return rec.items.reduce((a,i)=>a+Number(i.price||0)*Number(i.qty||i.count||1),0);
  return 0;
}
function itemName(i){return i.name||i.title||'商品'}
function render(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===active));
  ({dashboard,menu,sales,customers,battle:renderBattleTab,notice,notify,design,data}[active]||dashboard)();
}
function mount(html){$('main').innerHTML=html}

function dashboard(){
  const today=new Date().toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo'});
  const sales=state.sales||[];
  const todaySales=sales.filter(s=>String(s.time||s.date||'').includes(today));
  const total=sales.reduce((a,s)=>a+saleTotal(s),0);
  const ttotal=todaySales.reduce((a,s)=>a+saleTotal(s),0);
  const bs=loadBattleState(); const bm=battle.monsters[bs.index]||battle.monsters[0];
  mount(`
    <div class="panel"><div class="section-title">ダッシュボード</div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">今日の売上</div><div class="metric-value">${yen(ttotal)}</div></div>
        <div class="metric"><div class="metric-label">累計売上</div><div class="metric-value">${yen(total)}</div></div>
        <div class="metric"><div class="metric-label">注文履歴</div><div class="metric-value">${sales.length}</div></div>
        <div class="metric"><div class="metric-label">顧客数</div><div class="metric-value">${(state.customers||[]).length}</div></div>
      </div>
    </div>
    <div class="panel"><div class="section-title">現在の討伐</div>
      <div class="item-head"><div><div class="item-name">#${bs.index+1} ${esc(bm?.name||'敵')}</div><div class="item-sub">${esc(bm?.stage||'')} / HP ${Number(bs.hp||0).toLocaleString()} / ${Number(bm?.hp||0).toLocaleString()}</div></div>
      ${bm?.image?`<img class="preview-img" src="${esc(bm.image)}">`:''}</div>
      <div class="actions"><button class="btn" onclick="Admin.go('battle')">討伐設定へ</button><button class="btn" onclick="Admin.go('sales')">売上を見る</button></div>
    </div>
    <div class="panel"><div class="section-title">本日のお知らせ</div><div class="item-sub">状態：${state.settings?.noticeOn?'表示ON':'表示OFF'}</div><div class="item-name">${esc(state.settings?.noticeTitle||'本日のお知らせ')}</div><div class="help">${esc(state.settings?.noticeText||'未設定')}</div><div class="actions"><button class="btn gold" onclick="Admin.go('notice')">お知らせ編集</button></div></div>
    <div class="panel"><div class="section-title">管理メニュー</div>
      <div class="grid2">
        <button class="btn gold" onclick="Admin.go('menu')">メニュー管理</button>
        <button class="btn gold" onclick="Admin.go('battle')">討伐システム</button>
        <button class="btn" onclick="Admin.go('customers')">顧客管理</button>
        <button class="btn" onclick="Admin.go('notify')">通知設定</button>
      </div>
    </div>`);
}

function genreButtons(){
  return `<div class="genre-tabs">${CATS.map(([id,label])=>`<button class="genre-tab ${activeGenre===id?'active':''}" data-genre="${id}">${label}</button>`).join('')}</div>`;
}
function menu(){
  const items=(state.products||[]).filter(p=>(p.cat||'drink')===activeGenre);
  mount(`
    <div class="panel"><div class="section-title">メニュー管理</div>
      <div class="help">ジャンルごとに編集。非表示にしたい商品は「非表示」ジャンルへ移動。</div>
      ${genreButtons()}
      <div class="actions"><button class="btn gold" onclick="Admin.openProduct()">＋商品追加</button><button class="btn" onclick="Admin.sortProducts()">このジャンルを名前順</button></div>
    </div>
    <div>${items.map(productCard).join('')||'<div class="panel help">このジャンルの商品はありません。</div>'}</div>`);
  document.querySelectorAll('[data-genre]').forEach(b=>b.onclick=()=>{activeGenre=b.dataset.genre;menu()});
}
function productCard(p){
  return `<div class="item">
    <div class="item-head">
      <div>
        <div class="item-name">${esc(p.emoji||'🍽️')} ${esc(p.name)} <span class="badge">${esc(CAT_MAP[p.cat]||p.cat)}</span></div>
        <div class="item-sub">${yen(p.price)} / ${esc(p.desc||'説明なし')}</div>
        ${p.image?`<div class="item-sub">画像: ${esc(p.image)}</div>`:''}
      </div>
      <div class="item-sub">${yen(p.price)}</div>
    </div>
    <div class="actions">
      <button class="btn gold" onclick="Admin.openProduct('${p.id}')">編集</button>
      <button class="btn" onclick="Admin.copyProduct('${p.id}')">複製</button>
      <button class="btn red" onclick="Admin.deleteProduct('${p.id}')">削除</button>
    </div>
  </div>`;
}
function openProduct(id){
  const p=id?state.products.find(x=>x.id===id):{id:'',cat:activeGenre,name:'',price:0,emoji:'🍽️',desc:'',image:''};
  $('editModal').classList.add('on');
  $('editBox').innerHTML=`
    <div class="section-title">${id?'商品編集':'商品追加'}</div>
    <div class="field"><label>ジャンル</label><select id="pCat">${CATS.map(([cid,l])=>`<option value="${cid}" ${p.cat===cid?'selected':''}>${l}</option>`).join('')}</select></div>
    <div class="field"><label>商品名</label><input id="pName" value="${esc(p.name)}"></div>
    <div class="grid2"><div class="field"><label>価格</label><input id="pPrice" inputmode="numeric" type="number" value="${Number(p.price||0)}"></div><div class="field"><label>絵文字</label><input id="pEmoji" value="${esc(p.emoji||'')}"></div></div>
    <div class="field"><label>説明</label><textarea id="pDesc">${esc(p.desc||'')}</textarea></div>
    <div class="field"><label>画像URL/ファイル名</label><input id="pImage" value="${esc(p.image||'')}"></div>
    <div class="actions"><button class="btn" onclick="Admin.closeModal()">閉じる</button><button class="btn gold" onclick="Admin.saveProduct('${id||''}')">保存</button></div>`;
}
function saveProduct(id){
  const obj={id:id||uid(),cat:$('pCat').value,name:$('pName').value.trim()||'無名商品',price:Number($('pPrice').value)||0,emoji:$('pEmoji').value.trim(),desc:$('pDesc').value.trim(),image:$('pImage').value.trim()};
  if(id){
    const i=state.products.findIndex(p=>p.id===id);
    if(i>=0)state.products[i]=obj;
  }else state.products.push(obj);
  activeGenre=obj.cat; saveApp(); closeModal(); menu(); toast('保存しました');
}
function copyProduct(id){const p=state.products.find(x=>x.id===id);if(!p)return;state.products.push({...p,id:uid(),name:p.name+' コピー'});saveApp();menu();toast('複製しました')}
function deleteProduct(id){if(!confirm('削除しますか？'))return;state.products=state.products.filter(p=>p.id!==id);saveApp();menu();toast('削除しました')}
function sortProducts(){state.products.sort((a,b)=>String(a.cat).localeCompare(String(b.cat),'ja')||String(a.name).localeCompare(String(b.name),'ja'));saveApp();menu()}

function sales(){
  const sales=state.sales||[];
  const total=sales.reduce((a,s)=>a+saleTotal(s),0);
  const productMap={};
  sales.forEach(s=>(s.items||[]).forEach(i=>{const n=itemName(i);productMap[n]=(productMap[n]||0)+Number(i.qty||i.count||1)}));
  const ranking=Object.entries(productMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  mount(`
    <div class="panel"><div class="section-title">売上管理</div>
      <div class="metric-grid"><div class="metric"><div class="metric-label">累計売上</div><div class="metric-value">${yen(total)}</div></div><div class="metric"><div class="metric-label">履歴件数</div><div class="metric-value">${sales.length}</div></div></div>
      <div class="actions"><button class="btn" onclick="Admin.copySales()">売上をコピー</button><button class="btn red" onclick="Admin.clearSales()">売上履歴削除</button></div>
    </div>
    <div class="panel"><div class="section-title">商品別ランキング</div>${ranking.map(([n,q])=>`<div class="sales-line"><span>${esc(n)}</span><b>${q}</b></div>`).join('')||'<div class="help">まだ売上がありません。</div>'}</div>
    <div class="panel"><div class="section-title">注文履歴</div>${sales.slice().reverse().slice(0,80).map(s=>`<div class="sales-line"><span>${esc(s.time||s.date||'日時不明')}<br><span class="help">${esc((s.items||[]).map(i=>itemName(i)+'×'+(i.qty||i.count||1)).join(' / '))}</span></span><b>${yen(saleTotal(s))}</b></div>`).join('')||'<div class="help">履歴なし</div>'}</div>`);
}
function copySales(){
  const text=(state.sales||[]).map(s=>`${s.time||s.date||''}\t${saleTotal(s)}\t${(s.items||[]).map(i=>itemName(i)+'x'+(i.qty||i.count||1)).join(',')}`).join('\n');
  navigator.clipboard?.writeText(text); toast('コピーしました');
}
function clearSales(){if(!confirm('売上履歴を削除しますか？'))return;state.sales=[];saveApp();sales()}

function customers(){
  const cs=state.customers||[];
  mount(`<div class="panel"><div class="section-title">顧客管理</div><div class="help">冒険者名・来店回数・メモ管理。</div></div>
    ${cs.map((c,i)=>`<div class="item"><div class="item-name">${esc(c.name||'無名冒険者')}</div><div class="item-sub">Lv.${Number(c.level||1)} / 来店 ${Number(c.visits||0)}回 / ${esc(c.title||'')}</div><div class="field"><label>メモ</label><textarea data-cmemo="${i}">${esc(c.memo||'')}</textarea></div><div class="actions"><button class="btn gold" onclick="Admin.saveCustomerMemo(${i})">メモ保存</button><button class="btn red" onclick="Admin.deleteCustomer(${i})">削除</button></div></div>`).join('')||'<div class="panel help">顧客データなし</div>'}`);
}
function saveCustomerMemo(i){state.customers[i].memo=document.querySelector(`[data-cmemo="${i}"]`).value;saveApp();toast('保存しました')}
function deleteCustomer(i){if(!confirm('削除しますか？'))return;state.customers.splice(i,1);saveApp();customers()}

function renderBattleTab(){
  battle=loadBattle();
  const bs=loadBattleState(); const bm=battle.monsters[bs.index]||battle.monsters[0];
  mount(`<div class="panel"><div class="section-title">討伐システム</div>
    <div class="item"><div class="item-head"><div><div class="item-name">現在 #${bs.index+1} ${esc(bm?.name||'敵')}</div><div class="item-sub">${esc(bm?.stage||'')} / HP ${Number(bs.hp||0).toLocaleString()} / ${Number(bm?.hp||0).toLocaleString()}</div></div>${bm?.image?`<img class="preview-img" src="${esc(bm.image)}">`:''}</div></div>
    <label><input type="checkbox" id="bEnabled" ${battle.enabled?'checked':''}> 討伐システムON</label>
    <div class="grid2"><div class="field"><label>モード</label><select id="bMode"><option value="continue" ${battle.mode==='continue'?'selected':''}>冒険継続</option><option value="reset" ${battle.mode==='reset'?'selected':''}>会計でリセット</option></select></div>
    <div class="field"><label>演出速度</label><select id="bSpeed"><option value="slow" ${battle.speed==='slow'?'selected':''}>遅い</option><option value="normal" ${battle.speed==='normal'?'selected':''}>普通</option><option value="fast" ${battle.speed==='fast'?'selected':''}>速い</option></select></div></div>
    <div class="field"><label>背景候補（1行1ファイル名）</label><textarea id="bBgs">${esc((battle.backgrounds||[]).join('\n'))}</textarea></div>
    <div class="field"><label>敵画像候補（1行1ファイル名）</label><textarea id="bImgs">${esc((battle.monsterImages||[]).join('\n'))}</textarea></div>
    <div class="actions"><button class="btn gold" onclick="Admin.saveBattleBase()">基本保存</button><button class="btn" onclick="Admin.prevMonster()">前の敵</button><button class="btn" onclick="Admin.nextMonster()">次の敵</button><button class="btn red" onclick="Admin.resetBattleProgress()">進行リセット</button></div>
  </div>
  <div class="panel"><div class="section-title">敵リスト #1〜#${battle.monsters.length}</div>
    <div class="actions"><button class="btn gold" onclick="Admin.addMonster()">＋敵追加</button><button class="btn" onclick="Admin.fill15()">#15まで補完</button><button class="btn red" onclick="Admin.resetBattleConfig()">初期敵に戻す</button></div>
  </div>
  ${battle.monsters.map(monsterCard).join('')}`);
}
function bgSelect(v){return `<select class="mBg">${(battle.backgrounds||[]).map(b=>`<option value="${esc(b)}" ${b===v?'selected':''}>${esc(b)}</option>`).join('')}</select>`}
function imgSelect(v){return `<select class="mImg">${(battle.monsterImages||[]).map(b=>`<option value="${esc(b)}" ${b===v?'selected':''}>${esc(b)}</option>`).join('')}</select>`}
function monsterCard(m,i){
  return `<div class="item" data-mid="${esc(m.id)}">
    <div class="item-head"><div><div class="item-name">#${i+1} ${esc(m.name)}</div><div class="item-sub">${esc(m.stage)} / HP ${Number(m.hp).toLocaleString()}</div></div>${m.image?`<img class="preview-img" src="${esc(m.image)}">`:''}</div>
    <div class="grid2"><div class="field"><label>敵名</label><input class="mName" value="${esc(m.name)}"></div><div class="field"><label>ステージ名</label><input class="mStage" value="${esc(m.stage)}"></div></div>
    <div class="grid2"><div class="field"><label>HP</label><input class="mHp" type="number" value="${Number(m.hp)}"></div><div class="field"><label>絵文字</label><input class="mEmoji" value="${esc(m.emoji)}"></div></div>
    <div class="grid2"><div class="field"><label>敵画像</label>${imgSelect(m.image)}<input class="mImgFree" placeholder="直接入力" value="${esc(m.image)}"></div><div class="field"><label>背景</label>${bgSelect(m.background)}<input class="mBgFree" placeholder="直接入力" value="${esc(m.background)}"></div></div>
    <div class="actions"><button class="btn gold" onclick="Admin.saveMonster('${m.id}')">保存</button><button class="btn" onclick="Admin.moveMonster('${m.id}',-1)">↑</button><button class="btn" onclick="Admin.moveMonster('${m.id}',1)">↓</button><button class="btn red" onclick="Admin.deleteMonster('${m.id}')">削除</button></div>
  </div>`;
}
function saveBattleBase(){
  battle.enabled=$('bEnabled').checked;battle.mode=$('bMode').value;battle.speed=$('bSpeed').value;
  battle.backgrounds=$('bBgs').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  battle.monsterImages=$('bImgs').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  saveBattle();renderBattleTab();toast('保存しました');
}
function saveMonster(id){
  const card=document.querySelector(`[data-mid="${CSS.escape(id)}"]`); const m=battle.monsters.find(x=>x.id===id); if(!card||!m)return;
  m.name=card.querySelector('.mName').value.trim()||m.name;m.stage=card.querySelector('.mStage').value.trim();m.hp=Number(card.querySelector('.mHp').value)||500;m.emoji=card.querySelector('.mEmoji').value.trim()||'👾';
  m.image=card.querySelector('.mImgFree').value.trim()||card.querySelector('.mImg').value;
  m.background=card.querySelector('.mBgFree').value.trim()||card.querySelector('.mBg').value;
  saveBattle();renderBattleTab();toast('敵を保存しました');
}
function addMonster(){battle.monsters.push({id:'m'+Date.now(),name:'新しい敵',stage:'新ステージ',hp:500,image:battle.monsterImages[0]||'slime.png',background:battle.backgrounds[0]||'grass.png',emoji:'👾'});saveBattle();renderBattleTab()}
function fill15(){while(battle.monsters.length<15)addMonster();renderBattleTab()}
function deleteMonster(id){if(!confirm('削除しますか？'))return;battle.monsters=battle.monsters.filter(m=>m.id!==id);saveBattle();renderBattleTab()}
function moveMonster(id,d){const i=battle.monsters.findIndex(m=>m.id===id);const j=i+d;if(i<0||j<0||j>=battle.monsters.length)return;[battle.monsters[i],battle.monsters[j]]=[battle.monsters[j],battle.monsters[i]];saveBattle();renderBattleTab()}
function resetBattleConfig(){if(!confirm('討伐設定を初期化しますか？'))return;battle=clone(DEFAULT_BATTLE);saveBattle();localStorage.removeItem(BATTLE_STATE_KEY);localStorage.removeItem(BATTLE_APPLIED_KEY);renderBattleTab()}
function resetBattleProgress(){const s={index:0,hp:battle.monsters[0]?.hp||500,totalDamage:0};saveBattleState(s);localStorage.removeItem(BATTLE_APPLIED_KEY);renderBattleTab()}
function nextMonster(){const s=loadBattleState();s.index=Math.min(battle.monsters.length-1,s.index+1);s.hp=battle.monsters[s.index]?.hp||500;saveBattleState(s);renderBattleTab()}
function prevMonster(){const s=loadBattleState();s.index=Math.max(0,s.index-1);s.hp=battle.monsters[s.index]?.hp||500;saveBattleState(s);renderBattleTab()}


function notice(){
  const st=state.settings||{};
  mount(`<div class="panel"><div class="section-title">本日のお知らせ</div>
    <div class="help">QRコードから入った一般画面に出すお知らせ用。ON/OFFできます。</div>
    <label><input type="checkbox" id="noticeOn" ${st.noticeOn?'checked':''}> 本日のお知らせを表示する</label>
    <div class="field"><label>見出し</label><input id="noticeTitle" value="${esc(st.noticeTitle||'本日のお知らせ')}"></div>
    <div class="field"><label>本文</label><textarea id="noticeText">${esc(st.noticeText||'')}</textarea></div>
    <div class="field"><label>表示位置</label><select id="noticePlace">
      <option value="top" ${st.noticePlace==='top'?'selected':''}>メニュー上部</option>
      <option value="modal" ${st.noticePlace==='modal'?'selected':''}>入店時ポップアップ</option>
      <option value="both" ${st.noticePlace==='both'?'selected':''}>両方</option>
    </select></div>
    <div class="panel" style="margin-top:10px">
      <div class="section-title">${esc(st.noticeTitle||'本日のお知らせ')}</div>
      <div class="help">${esc(st.noticeText||'ここにお知らせ本文が入ります。')}</div>
      <div class="badge">${st.noticeOn?'表示ON':'表示OFF'}</div>
    </div>
    <div class="actions"><button class="btn gold" onclick="Admin.saveNotice()">保存</button><button class="btn red" onclick="Admin.clearNotice()">クリア</button></div>
  </div>`);
}
function saveNotice(){
  state.settings=state.settings||{};
  state.settings.noticeOn=$('noticeOn').checked;
  state.settings.noticeTitle=$('noticeTitle').value.trim()||'本日のお知らせ';
  state.settings.noticeText=$('noticeText').value.trim();
  state.settings.noticePlace=$('noticePlace').value;
  saveApp();
  toast('本日のお知らせを保存しました');
  notice();
}
function clearNotice(){
  state.settings=state.settings||{};
  state.settings.noticeOn=false;
  state.settings.noticeTitle='本日のお知らせ';
  state.settings.noticeText='';
  state.settings.noticePlace='top';
  saveApp();
  notice();
  toast('クリアしました');
}


function notify(){
  const st=state.settings||{};
  mount(`<div class="panel"><div class="section-title">通知設定</div>
    <div class="help">現在の一般画面はGAS通知を使用しています。URLを控えておく場所として使えます。</div>
    <div class="field"><label>GAS / Discord中継URL</label><input id="nGas" value="${esc(st.gasUrl||GAS_URL)}"></div>
    <label><input type="checkbox" id="nOn" ${st.notifyOff?'':'checked'}> 注文通知ON</label>
    <div class="actions"><button class="btn gold" onclick="Admin.saveNotify()">保存</button><button class="btn" onclick="Admin.testNotify()">通知テスト</button></div>
  </div>`);
}
function saveNotify(){state.settings=state.settings||{};state.settings.gasUrl=$('nGas').value.trim();state.settings.notifyOff=!$('nOn').checked;saveApp();toast('保存しました')}
function testNotify(){fetch(($('nGas').value.trim()||GAS_URL),{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'test',guild:'おたく場ギルド',time:new Date().toLocaleString('ja-JP')})}).catch(()=>{});toast('テスト送信しました')}

function design(){
  const st=state.settings||{};
  mount(`<div class="panel"><div class="section-title">デザイン設定</div>
    <div class="field"><label>通常背景URL/ファイル名</label><input id="dBg" value="${esc(st.customBg||'')}"></div>
    <div class="field"><label>タイトル背景URL/ファイル名</label><input id="dTitleBg" value="${esc(st.customTitleBg||'')}"></div>
    <div class="field"><label>BGM URL/ファイル名</label><input id="dBgm" value="${esc(st.customBgm||'')}"></div>
    <div class="actions"><button class="btn gold" onclick="Admin.saveDesign()">保存</button><button class="btn red" onclick="Admin.clearDesign()">背景設定クリア</button></div>
  </div>`);
}
function saveDesign(){state.settings=state.settings||{};state.settings.customBg=$('dBg').value.trim();state.settings.customTitleBg=$('dTitleBg').value.trim();state.settings.customBgm=$('dBgm').value.trim();saveApp();toast('保存しました')}
function clearDesign(){state.settings.customBg='';state.settings.customTitleBg='';state.settings.customBgm='';saveApp();design()}

function data(){
  mount(`<div class="panel"><div class="section-title">データ管理</div>
    <div class="actions"><button class="btn" onclick="Admin.exportAll()">全部コピー</button><button class="btn gold" onclick="Admin.importOpen()">貼り付け復元</button><button class="btn red" onclick="Admin.resetAll()">全初期化</button></div>
    <div class="field"><label>インポート/エクスポート</label><textarea id="dataBox"></textarea></div>
  </div>`);
}
function exportAll(){const data={app:state,battle:battle,battleState:loadBattleState()};$('dataBox').value=JSON.stringify(data,null,2);navigator.clipboard?.writeText($('dataBox').value);toast('コピーしました')}
function importOpen(){try{const data=JSON.parse($('dataBox').value);if(data.app)state=normalizeApp(data.app);if(data.battle)battle=normalizeBattle(data.battle);saveApp();saveBattle();if(data.battleState)saveBattleState(data.battleState);toast('復元しました')}catch(e){toast('JSONエラー')}}
function resetAll(){if(!confirm('全データを初期化しますか？'))return;localStorage.removeItem(APP_KEY);localStorage.removeItem(BATTLE_KEY);localStorage.removeItem(BATTLE_STATE_KEY);localStorage.removeItem(BATTLE_APPLIED_KEY);state=loadApp();battle=loadBattle();render();toast('初期化しました')}

function closeModal(){$('editModal').classList.remove('on')}
window.Admin={go(t){active=t;render()},openProduct,saveProduct,closeModal,copyProduct,deleteProduct,sortProducts,copySales,clearSales,saveCustomerMemo,deleteCustomer,saveBattleBase,saveMonster,addMonster,fill15,deleteMonster,moveMonster,resetBattleConfig,resetBattleProgress,nextMonster,prevMonster,saveNotice,clearNotice,saveNotify,testNotify,saveDesign,clearDesign,exportAll,importOpen,resetAll};

$('topTabs').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(!b)return;active=b.dataset.tab;render()});
$('editModal').addEventListener('click',e=>{if(e.target.id==='editModal')closeModal()});
render();

})();
</script>
</body>
</html>
